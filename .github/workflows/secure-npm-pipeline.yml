name: "Secure NPM Pipeline"

on:
  workflow_call:
    inputs:
      framework-repo:
        description: 'Repositorio host del framework de seguridad'
        required: false
        default: 'CurrJere/TFG---Control-de-la-supply-chain'
        type: string
      framework-ref:
        description: 'Referencia del framework. Tag de release, inmutable por convención.'
        required: false
        default: 'v1.0.0'
        type: string
      fail-on-findings:
        description: 'Fuerza el fallo del pipeline si la Capa 1 detecta anomalías estructurales'
        required: false
        default: 'false'
        type: string

# Principio de mínimo privilegio
permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  security-analysis:
    name: Análisis DevSecOps (Supply Chain)
    runs-on: ubuntu-latest

    steps:
    # Fijamos los actions por su SHA criptográfico 
    # para mitigar ataques de envenenamiento en nuestra propia cadena.
    - name: Checkout del código cliente
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Checkout del Framework de Seguridad
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        repository: ${{ inputs.framework-repo }}
        ref: ${{ inputs.framework-ref }}
        path: ./.security-framework

    - name: Setup Node.js (Determinista)
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: '20'

    # CAPA 1: Validación Estructural
    - name: Capa 1 - Ejecutar parser estructural de package.json
      env:
        FAIL_ON_FINDINGS: ${{ inputs.fail-on-findings }}
      run: bash ./.security-framework/scripts/validate-package-json.sh

    # CAPA 2: Análisis Semántico
    - name: Capa 2 - Inicializar motor CodeQL
      uses: github/codeql-action/init@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3
      with:
        languages: javascript
        queries: ./.security-framework/javascript/src

    - name: Capa 2 - Ejecutar análisis estático (Taint Tracking)
      uses: github/codeql-action/analyze@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3
      with:
        category: "/language:javascript"
        output: codeql-results

    # Interceptamos los resultados en crudo (SARIF) antes de continuar.
    # Si la regla de exfiltración salta, el build muere aquí mismo.
    - name: Security Gate - Evaluación de Exfiltración
      run: |
        shopt -s nullglob
        total_findings=0
        
        for report in codeql-results/*.sarif; do
          count=$(jq '[.runs[]?.results[]? | select((.ruleId // "") | test("secret-exfiltration"))] | length' "$report")
          total_findings=$((total_findings + count))
        done
        
        echo "[INFO] Alertas de exfiltración detectadas: $total_findings"
        
        if [ "$total_findings" -gt 0 ]; then
          echo "::error::[CRITICAL] Flujo de exfiltración de secretos detectado. Abortando pipeline."
          exit 1
        fi
        
        echo "[INFO] Validación semántica superada."

    # INSTALACIÓN BLINDADA
    # Fuerza el uso del lockfile y anula los vectores de propagación automática
    - name: Instalación de dependencias (Strict Mode)
      run: npm ci --ignore-scripts