# El pipeline reutilizable que otros llamarán
name: "Secure NPM Pipeline"

on:
  workflow_call:
    inputs:
      framework-repo:
        description: 'Repositorio del framework de seguridad (org/repo)'
        required: false
        default: 'CurrJere/TFG---Control-de-la-supply-chain'
        type: string
      framework-ref:
        description: 'Rama, tag o SHA del framework a usar'
        required: false
        default: 'main'
        type: string
      fail-on-findings:
        description: 'Si true, el pipeline falla cuando la Capa 1 detecta problemas en package.json'
        required: false
        default: 'false'
        type: string

# Confianza Cero (Zero Trust)
permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  security-analysis:
    name: Análisis de Supply Chain
    runs-on: ubuntu-latest

    steps:
    # PASO A: Checkout del código cliente (el Cebo)
    - name: Checkout del código cliente
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    # PASO B: Checkout del Framework de Seguridad
    - name: Checkout del Framework de Seguridad
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        repository: ${{ inputs.framework-repo }}
        ref: ${{ inputs.framework-ref }}
        path: ./.security-framework

    # PASO C: Node.js fijado
    - name: Setup Node.js
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: '20'

    # PASO D: Capa 1 - Validación estructural del package.json
    - name: Capa 1 - Validación estructural de package.json
      env:
        FAIL_ON_FINDINGS: ${{ inputs.fail-on-findings }}
      run: bash ./.security-framework/scripts/validate-package-json.sh

    # PASO E: Capa 2 - Inicializa CodeQL
    - name: Capa 2 - Inicializar CodeQL
      uses: github/codeql-action/init@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3
      with:
        languages: javascript
        queries: ./.security-framework/javascript/src

    # PASO F: Análisis semántico  (« NUEVO »: guarda el SARIF en una carpeta para el gate)
    - name: Capa 2 - Ejecutar análisis CodeQL
      uses: github/codeql-action/analyze@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3
      with:
        category: "/language:javascript"
        output: codeql-results          # « NUEVO »: escribe el resultado en disco (además de subirlo a Security)

    # PASO F-bis: GATE  (« NUEVO »)  -- si la query de exfiltración encontró algo, BLOQUEA el build.
    # La exfiltración de secretos es crítica: detiene el pipeline SIEMPRE (objetivo 1: 100% de bloqueo).
    - name: Capa 2 - Gate de exfiltración
      run: |
        shopt -s nullglob
        total=0
        for f in codeql-results/*.sarif; do
          n=$(jq '[.runs[]?.results[]? | select((.ruleId // "") | test("secret-exfiltration"))] | length' "$f")
          total=$((total + n))
        done
        echo "Hallazgos de la query de exfiltración: $total"
        if [ "$total" -gt 0 ]; then
          echo "::error::[CRITICAL] Exfiltración de secretos detectada por CodeQL. Pipeline BLOQUEADO."
          exit 1
        fi
        echo "✅ Sin exfiltración detectada."

    # PASO G: Instalación blindada (lockfile + sin scripts)
    - name: Instalación segura (npm ci con scripts deshabilitados)
      run: npm ci --ignore-scripts