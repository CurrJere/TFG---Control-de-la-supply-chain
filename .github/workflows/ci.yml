name: CI Pipeline (Vulnerable)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    # ESTE ES EL PUNTO CRÍTICO: Instalación estándar
    - name: Instalar dependencias
      run: npm install